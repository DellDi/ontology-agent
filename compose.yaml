name: ontology-agent

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cube:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      APP_PORT: ${APP_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CUBE_API_URL: http://cube:4000/cubejs-api/v1
      CUBE_API_TOKEN: ${CUBE_API_TOKEN}
      CUBE_QUERY_TIMEOUT_MS: ${CUBE_QUERY_TIMEOUT_MS}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
      SESSION_SECRET: ${SESSION_SECRET}
      ENABLE_DEV_ERP_AUTH: ${ENABLE_DEV_ERP_AUTH}
    ports:
      - "127.0.0.1:${APP_PORT}:${APP_PORT}"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store
    working_dir: /workspace

  postgres:
    image: postgres:18.2-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store
    working_dir: /workspace
    command:
      [
        "bash",
        "-lc",
        "echo 'Running database migrations...' && ./scripts/docker/ensure-node-modules.sh && pnpm db:migrate && echo 'Migrations complete'",
      ]
    restart: "no"

  redis:
    image: redis:8.2.5-bookworm
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      cube:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CUBE_API_URL: http://cube:4000/cubejs-api/v1
      CUBE_API_TOKEN: ${CUBE_API_TOKEN}
      CUBE_QUERY_TIMEOUT_MS: ${CUBE_QUERY_TIMEOUT_MS}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
    volumes:
      - .:/workspace
      - worker-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store
    working_dir: /workspace
    command: ["bash", "-lc", "./scripts/docker/ensure-node-modules.sh && pnpm worker:dev"]

  cube:
    image: cubejs/cube:v1.6.31
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: postgres
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: ${POSTGRES_DB}
      CUBEJS_DB_USER: ${POSTGRES_USER}
      CUBEJS_DB_PASS: ${POSTGRES_PASSWORD}
      CUBEJS_API_SECRET: ${CUBE_API_SECRET}
      CUBEJS_DEV_MODE: "true"
      CUBEJS_TELEMETRY: "false"
    ports:
      - "127.0.0.1:${CUBE_PORT}:4000"
    volumes:
      - ./cube/conf:/cube/conf
      - cube-store:/cube/conf/.cubestore
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/readyz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  neo4j:
    image: neo4j:5.26.24-community-ubi9
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_dbms_default__database: ${NEO4J_DATABASE}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://127.0.0.1:7687 -u ${NEO4J_USERNAME} -p ${NEO4J_PASSWORD} 'RETURN 1;' >/dev/null",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
  cube-store:
  neo4j-data:
  neo4j-logs:
  web-node-modules:
  worker-node-modules:
  pnpm-store:
