name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ── 静态检查（不需要数据库） ──────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm exec tsc --noEmit

  # ── 集成测试（需要 Postgres + Redis） ─────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ontology_agent
          POSTGRES_USER: ontology_agent
          POSTGRES_PASSWORD: ontology_agent_dev_password
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U ontology_agent -d ontology_agent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ontology_agent:ontology_agent_dev_password@127.0.0.1:55432/ontology_agent
      REDIS_URL: redis://127.0.0.1:6379
      SESSION_SECRET: ci-test-session-secret
      ENABLE_DEV_ERP_AUTH: "1"
      REDIS_KEY_PREFIX: ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Run tests
        run: node --test tests/story-*.test.mjs
        timeout-minutes: 10
